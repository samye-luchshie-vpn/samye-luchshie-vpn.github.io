<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="55%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="shf" x1="6" y1="4" x2="26" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <radialGradient id="dot" cx="22" cy="10" r="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f97316"/>
    </radialGradient>
  </defs>

  <!-- Rounded square app-icon background -->
  <rect width="32" height="32" rx="8" fill="url(#bgg)"/>

  <!-- Top-edge sheen -->
  <rect x="3" y="1" width="26" height="13" rx="7" fill="white" opacity="0.10"/>

  <!-- Diagonal speed lines (suggesting "fast / works") -->
  <path d="M2 22 L10 22" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.20"/>
  <path d="M3 26 L8 26" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.15"/>

  <!-- Shield body -->
  <path d="M16 5L7 8.5V15.4C7 21.0 10.9 25.8 16 27.4C21.1 25.8 25 21.0 25 15.4V8.8L24 8.4Z"
        fill="url(#shf)"/>

  <!-- Bold checkmark -->
  <path d="M11.5 16L14.7 19.6L21 12.5"
        stroke="#0d9488" stroke-width="2.6"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Status dot (signal "live" / "online" — eye catcher) -->
  <circle cx="23.5" cy="9" r="4.5" fill="url(#dot)" stroke="white" stroke-width="1.2"/>
  <circle cx="23.5" cy="9" r="1.6" fill="white"/>
</svg>
